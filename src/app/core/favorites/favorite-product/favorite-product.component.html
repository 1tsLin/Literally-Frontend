<div class="card" (click)="seeDetails()">
  <div class="book-cover">
    <img [src]="productCoverUrl" />
  </div>
  <div class="book-content">
    <p class="book-title">
      {{ product.title }}
    </p>
    <p class="book-author">{{ product.authorName }}</p>
    <app-grade
      [grade]="product.grade"
      [totalReviews]="product.reviews"
    ></app-grade>
    <p class="book-price">{{ product.price }}<span class="currency">€</span></p>
    <div class="button-row">
      <a
        class="delete-button"
        (click)="removeFavorite(); $event.stopPropagation()"
        >{{ "PAGES.FAVORITES.DELETE" | translate }}</a
      >
    </div>
  </div>
</div>
