<div class="card" (click)="seeDetails()">
  <div class="favorite-button-row">
    <button
      class="add-favorite-button"
      (click)="toggleFavorite(); $event.stopPropagation()"
    >
      @if (isInFavorites()) {
        <img src="/icons/added-favorite.svg" />
      } @else {
        <img src="/icons/add-favorite.svg" />
      }
    </button>
  </div>
  <div class="book-cover">
    <img [src]="productCoverUrl" />
  </div>
  <div class="book-content">
    <p class="book-title">
      {{ product.title }}
    </p>
    <p class="book-author">{{ product.authorName }}</p>
    <app-grade
      [grade]="product.grade"
      [totalReviews]="product.reviews"
    ></app-grade>
    <p class="book-price">
      {{ product.price | number: "1.2-2" }}<span class="currency">€</span>
    </p>
    <div class="cart-button-row">
      <button
        class="add-cart-button"
        (click)="addToCart(); $event.stopPropagation()"
      >
        {{ "PAGES.HOME.HIGHLIGHT.BUTTON" | translate }}
      </button>
    </div>
  </div>
</div>
