<header class="header">
  <a routerLink="" class="left-section">
    <img class="logo-picture" src="/logo/logo_literally-1.svg" />
  </a>

  <div class="middle-section">
    <input
      class="search-bar"
      type="text"
      [placeholder]="'LAYOUT.HEADER.SEARCH' | translate"
      [(ngModel)]="searchInput"
      (keydown.enter)="search()"
    />
    <button class="search-button" (click)="search()">
      <img src="/icons/search-icon.svg" />
    </button>
  </div>

  <nav class="right-section">
    <a routerLink="/cart" class="cart-button">
      <img src="/icons/cart-icon.svg" />
      <p>{{ "LAYOUT.HEADER.BUTTONS.CART" | translate }}</p>
    </a>
    <a routerLink="/favorites" class="favorite-button">
      <img src="/icons/favorite-icon.svg" />
      <p>{{ "LAYOUT.HEADER.BUTTONS.FAVORITES" | translate }}</p>
    </a>
    <a routerLink="/login" class="profile-button">
      <img src="/icons/profile-icon.svg" />
      <p>{{ "LAYOUT.HEADER.BUTTONS.LOGIN" | translate }}</p>
    </a>
  </nav>
</header>
