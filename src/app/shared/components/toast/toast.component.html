<div class="toast-container">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast toast--{{ toast.type }}">
      <span>{{ toast.message }}</span>
      <button class="close-button" (click)="toastService.dismiss(toast.id)">
        ✕
      </button>
    </div>
  }
</div>
